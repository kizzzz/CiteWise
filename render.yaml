services:
  - type: web
    name: citewise
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: "https://open.bigmodel.cn/api/paas/v4/"
      - key: LLM_MODEL
        value: "glm-4.7"
